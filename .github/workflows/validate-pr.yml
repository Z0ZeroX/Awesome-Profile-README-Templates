# Validate Pull Requests
name: Validate PR

on:
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Get changed files
        id: changed-files
        run: |
          CHANGED=$(git diff --name-status origin/${{ github.base_ref }}...HEAD)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Changed files with status:"
          echo "$CHANGED"

      - name: Validate template files
        run: |
          ERRORS=0
          CHANGED_FILES="${{ steps.changed-files.outputs.files }}"

          while IFS= read -r line; do
            if [ -z "$line" ]; then continue; fi
            
            STATUS=$(echo "$line" | awk '{print $1}')
            file=$(echo "$line" | cut -f2-)

            # Only check .md files inside templates/
            if echo "$file" | grep -qE '^templates/.+/.+\.md$'; then
              echo "🔍 Checking template ($STATUS): $file"

              # Check file exists (not deleted in PR)
              if [ ! -f "$file" ]; then
                echo "   Skipped (deleted/non-existent)"
                continue
              fi

              # Check path structure: templates/{category}/{username}.md
              CATEGORY=$(echo "$file" | cut -d'/' -f2)
              FILENAME=$(basename "$file" .md)

              VALID_CATEGORIES="creative-artistic code-focused dynamic-interactive minimalistic data-visual media-rich badges-icons showcase-collections others"
              if ! echo "$VALID_CATEGORIES" | grep -qw "$CATEGORY"; then
                echo "❌ Invalid category '$CATEGORY' in: $file"
                echo "   Valid categories: $VALID_CATEGORIES"
                ERRORS=$((ERRORS + 1))
              fi

              # Enforce Credit line check ONLY for newly added files to avoid blocking edits to old templates
              if [ "$STATUS" = "A" ]; then
                if ! grep -qi "Credit:" "$file"; then
                  echo "❌ Missing 'Credit:' line in new template: $file (required by CONTRIBUTING.md)"
                  ERRORS=$((ERRORS + 1))
                fi
              fi

              # Check file is not empty
              if [ ! -s "$file" ]; then
                echo "❌ Empty file: $file"
                ERRORS=$((ERRORS + 1))
              fi

              echo "   Category: $CATEGORY | File: $FILENAME.md"
            fi
          done <<< "$CHANGED_FILES"

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "❌ Validation failed with $ERRORS error(s). Please fix and re-push."
            exit 1
          else
            echo ""
            echo "✅ All template files passed validation!"
          fi

      - name: Syntax check JavaScript code
        run: |
          node --check assets/js/script.js
          echo "✅ JavaScript syntax check passed"

      - name: Run unit tests
        run: |
          node scripts/generate-metadata.test.js

      - name: Validate metadata generation
        run: |
          node scripts/generate-metadata.js
          echo "✅ Metadata generation successful"
