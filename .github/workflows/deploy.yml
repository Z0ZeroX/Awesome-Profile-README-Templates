# Deploy to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/**'
      - 'assets/**'
      - 'index.html'
      - 'scripts/**'
      - 'previews/**'
      - 'data/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      metadata-changed: ${{ steps.git-check.outputs.changed }}
      deploy-sha: ${{ steps.git-check.outputs.deploy-sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history to check changes

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Check if templates changed
        id: check-templates
        run: |
          if git diff-tree --no-commit-id --name-only -r HEAD | grep -q '^templates/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Templates have changed, metadata generation required."
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No template changes detected. Skipping metadata generation."
          fi

      - name: Generate metadata
        if: steps.check-templates.outputs.changed == 'true'
        run: node scripts/generate-metadata.js

      - name: Commit if changed
        id: git-check
        run: |
          git add data/templates.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "deploy-sha=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "No metadata changes to commit."
          else
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git commit -m "chore: update templates metadata [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "deploy-sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
            echo "Metadata changes committed and pushed."
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: update-metadata
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ needs.update-metadata.outputs.deploy-sha }}

      - name: Prepare Pages directory
        run: |
          mkdir -p _site
          cp -r index.html assets previews data templates docs _site/
          cp sitemap.xml robots.txt _site/ 2>/dev/null || true
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
