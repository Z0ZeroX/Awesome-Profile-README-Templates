# Deploy to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      metadata-changed: ${{ steps.git-check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: contains(toJSON(github.event.commits.*.modified), 'templates/') || contains(toJSON(github.event.commits.*.added), 'templates/') || contains(toJSON(github.event.commits.*.removed), 'templates/')
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate metadata
        if: contains(toJSON(github.event.commits.*.modified), 'templates/') || contains(toJSON(github.event.commits.*.added), 'templates/') || contains(toJSON(github.event.commits.*.removed), 'templates/')
        run: node scripts/generate-metadata.js

      - name: Commit if changed
        id: git-check
        run: |
          git add data/templates.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git commit -m "chore: update templates metadata [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: update-metadata
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ needs.update-metadata.outputs.metadata-changed == 'true' && 'main' || github.sha }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
